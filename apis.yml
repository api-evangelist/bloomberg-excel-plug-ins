aid: bloomberg-excel-plug-ins
name: Bloomberg Excel Plug-ins
description: Bloomberg Excel Plug-ins integrate Bloomberg market data, analytics,
  and functions directly into Microsoft Excel. The Bloomberg Add-in for Excel provides
  the BDH, BDP, BDS, and other Bloomberg formula functions to pull real-time and historical
  data, enabling quantitative analysis, financial modeling, and reporting without
  leaving the spreadsheet environment.
