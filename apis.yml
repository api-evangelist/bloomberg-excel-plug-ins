common:
- type: Portal
  url: https://www.bloomberg.com/professional/
- type: Documentation
  url: https://developer.bloomberg.com/
- type: TermsOfService
  url: https://www.bloomberg.com/notices/tos/
- type: PrivacyPolicy
  url: https://www.bloomberg.com/privacy/
- type: Support
  url: https://www.bloomberg.com/professional/support/
- type: Features
  data:
  - name: BDP Formula
    description: Bloomberg Data Point formula for real-time and static data retrieval
      in Excel.
  - name: BDH Formula
    description: Bloomberg Data History formula for historical time series data retrieval.
  - name: BDS Formula
    description: Bloomberg Data Set formula for multi-cell data retrieval and tables.
  - name: BQL Integration
    description: Bloomberg Query Language support directly in Excel for advanced
      custom queries.
  - name: Real-Time Updates
    description: Automatic data refresh for real-time market data in Excel cells.
  - name: Portfolio Analysis Templates
    description: Pre-built Excel templates for portfolio analysis, risk, and reporting.
- type: UseCases
  data:
  - name: Financial Modeling
    description: Build discounted cash flow models and valuation models with live
      Bloomberg data.
  - name: Portfolio Reporting
    description: Create automated portfolio reports with real-time and historical
      data.
  - name: Risk Analysis
    description: Pull pricing, volatility, and correlation data for risk calculations.
  - name: Market Research
    description: Analyze market trends and securities data without leaving Excel.
  - name: Quantitative Analysis
    description: Run quantitative screens and backtests using Bloomberg historical
      data in Excel.
