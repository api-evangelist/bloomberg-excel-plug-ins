apis:
- aid: bloomberg-excel-plug-ins:bloomberg-excel-addin
  name: Bloomberg Excel Add-in
  description: The Bloomberg Add-in for Microsoft Excel provides formula functions
    including BDP (Bloomberg Data Point), BDH (Bloomberg Data History), BDS (Bloomberg
    Data Set), and BQL for accessing Bloomberg data directly in spreadsheets.
  humanURL: https://www.bloomberg.com/professional/support/software-updates/
  baseURL: https://bloomberg.com/excel
